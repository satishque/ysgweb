<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Page not found — Your Support Genie (YSG)</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="uploads/YSG-logo.svg">
<style>
  :root{
    --bg:#ffffff; --fg:#14171f; --fg-muted:#333c4c; --fg-dim:#6b7280;
    --accent:#2563eb; --accent-soft:rgba(37,99,235,.09); --border:rgba(18,22,31,.13);
  }
  *{box-sizing:border-box;}
  body{margin:0;}
  a{text-decoration:none;color:inherit;}
</style>
</helmet>
<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);color:var(--fg);font-family:'IBM Plex Sans',sans-serif;padding:32px;text-align:center;">
  <svg width="64" height="69" viewBox="0 0 50 54" style="display:block;overflow:visible;margin-bottom:24px;">
    <defs>
      <linearGradient id="ysgFace" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#5a85cf"></stop>
        <stop offset="0.5" stop-color="#2E5495"></stop>
        <stop offset="1" stop-color="#1d3a6e"></stop>
      </linearGradient>
    </defs>
    <rect x="8" y="11" width="34" height="32" fill="url(#ysgFace)"></rect>
    <rect x="8" y="11" width="34" height="1.6" fill="#7ba0dd" opacity="0.5"></rect>
    <text x="25" y="27.5" text-anchor="middle" dominant-baseline="middle" font-family="'Space Grotesk',Arial,sans-serif" font-weight="700" font-size="14" fill="#ffffff" letter-spacing="0.4">YSG</text>
  </svg>
  <div style="font-family:'IBM Plex Mono',monospace;font-size:13px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-bottom:10px;">404</div>
  <h1 style="font-family:'Space Grotesk',sans-serif;font-size:clamp(26px,4vw,38px);font-weight:600;letter-spacing:-.02em;margin:0 0 12px;color:var(--fg);">Page not found</h1>
  <p style="font-size:15px;line-height:1.6;color:var(--fg-muted);max-width:420px;margin:0 0 28px;">The page you're looking for doesn't exist or may have moved. Let's get you back on track.</p>
  <a href="index.html" style="display:inline-flex;align-items:center;gap:9px;background:var(--accent);color:#fff;font-size:15px;font-weight:600;padding:13px 24px;border-radius:11px;transition:filter .15s;" style-hover="filter:brightness(1.08)">Back to Home <span style="font-size:17px;">→</span></a>
</div>

</x-dc>
</body>
</html>
